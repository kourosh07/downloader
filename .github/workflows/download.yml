name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080p, 720p, 480p, 360p, 192kbps)'
        required: false
        type: string
        default: '720p'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip ffmpeg
          pip3 install --quiet requests

      - name: Get Video Info
        id: info
        run: |
          python3 << 'EOF'
          import os, re, requests

          URL = os.environ.get('INPUT_URL')
          
          vid_id = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)
          if not vid_id:
              print("::error::Invalid YouTube URL")
              exit(1)
          
          vid_id = vid_id.group(1)
          
          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"})
          
          try:
              info_url = f"https://noembed.com/embed?url=https://www.youtube.com/watch?v={vid_id}"
              resp = s.get(info_url, timeout=15)
              data = resp.json()
              title = data.get('title', f'youtube_{vid_id}')
          except:
              title = f'youtube_{vid_id}'
          
          clean = re.sub(r'[^a-zA-Z0-9\-_()[\]\s]', '', title)
          clean = re.sub(r'\s+', '_', clean)
          clean = re.sub(r'_+', '_', clean).strip('_')[:80]
          
          if not clean:
              clean = vid_id
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"title={clean}\n")
              f.write(f"vid={vid_id}\n")
          EOF
        env:
          INPUT_URL: ${{ github.event.inputs.url }}

      - name: Download Video
        id: download
        run: |
          python3 << 'EOF'
          import os, sys, time, requests

          URL = os.environ.get('INPUT_URL')
          QUAL = os.environ.get('INPUT_QUALITY')
          TITLE = os.environ.get('INPUT_TITLE')
          VID = os.environ.get('INPUT_VID')

          if QUAL.lower() == 'best':
              QUAL = '1080p'

          is_audio = QUAL.endswith('kbps')
          
          if is_audio:
              payload = {
                  "url": URL,
                  "os": "linux",
                  "output": {
                      "type": "audio",
                      "format": "mp3",
                      "bitrate": QUAL.replace('kbps', '')
                  }
              }
              ext = "mp3"
          else:
              payload = {
                  "url": URL,
                  "os": "linux",
                  "output": {
                      "type": "video",
                      "format": "mp4",
                      "quality": QUAL
                  }
              }
              ext = "mp4"

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"})
          
          try:
              s.get("https://media.ytmp3.gg/", timeout=10)
          except:
              pass

          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          status_url = data.get('statusUrl')
          if not status_url:
              print("::error::No status URL returned")
              sys.exit(1)

          dl_url = None
          for attempt in range(180):
              time.sleep(2)
              try:
                  r = s.get(status_url, timeout=20)
                  status = r.json()
                  
                  if status.get('status') == 'completed':
                      dl_url = status.get('downloadUrl')
                      break
                  elif status.get('status') == 'failed':
                      print("::error::Server failed to process video")
                      sys.exit(1)
              except Exception as e:
                  if attempt < 5:
                      time.sleep(3)
                      continue
                  print(f"::warning::Status check {attempt} failed: {e}")

          if not dl_url:
              print("::error::Download URL not found after waiting")
              sys.exit(1)

          filename = f"{TITLE}_{VID}_{QUAL}.{ext}"
          filename = filename.replace('/', '_').replace('\\', '_')

          mkdir -p temp_dl

          print(f"Downloading: {filename}")
          
          import subprocess
          result = subprocess.run([
              'curl', '-L', '--fail', '--retry', '5', '--retry-delay', '5',
              '--connect-timeout', '30', '--max-time', '900',
              '-A', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              '-o', f'temp_dl/{filename}',
              dl_url
          ], capture_output=True, text=True)
          
          if result.returncode != 0:
              print(f"::error::Download failed: {result.stderr}")
              sys.exit(1)

          file_size = os.path.getsize(f'temp_dl/{filename}')
          if file_size == 0:
              print("::error::Downloaded file is empty")
              sys.exit(1)

          file_size_mb = file_size / (1024 * 1024)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"filename={filename}\n")
              f.write(f"filesize={file_size}\n")
              f.write(f"filesize_mb={file_size_mb:.1f}\n")
              f.write(f"filepath=temp_dl/{filename}\n")
          EOF
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
          INPUT_TITLE: ${{ steps.info.outputs.title }}
          INPUT_VID: ${{ steps.info.outputs.vid }}

      - name: Split Large File
        id: split
        run: |
          FILEPATH="${{ steps.download.outputs.filepath }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          FILESIZE="${{ steps.download.outputs.filesize }}"
          THRESH_MB=90
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          cd temp_dl || exit 1

          if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
            echo "Splitting file (${THRESH_MB}MB parts)..."
            BASE="${FILENAME%.*}"
            zip -r -s "${THRESH_MB}m" "${BASE}.zip" "$FILENAME"
            rm -f "$FILENAME"
            echo "splitted=true" >> "$GITHUB_OUTPUT"
            echo "archive_name=${BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "No split needed (${{ steps.download.outputs.filesize_mb }}MB)"
            echo "splitted=false" >> "$GITHUB_OUTPUT"
          fi

          cd ..

      - name: Get Current Date
        id: get_date
        run: |
          echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p downloads
          
          mv temp_dl/* downloads/ 2>/dev/null || true
          
          git pull origin main --rebase || git pull origin master --rebase || true
          
          git add downloads/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📥 YouTube: ${{ steps.download.outputs.filename }} (${{ steps.download.outputs.filesize_mb }}MB) [skip ci]"
            git push origin HEAD:main || git push origin HEAD:master
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf temp_dl

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Title | ${{ steps.info.outputs.title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | ${{ steps.download.outputs.filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ github.event.inputs.quality }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.download.outputs.filesize_mb }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Split | ${{ steps.split.outputs.splitted == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
